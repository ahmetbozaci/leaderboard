<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css?family=Bangers:regular" rel="stylesheet" />
    <link rel="stylesheet" href="scss/style.css">
    <title>LeaderBoard</title>
  </head>
  <body class="container">
    <h1>LeaderBoard</h1>
    <div class="flex">
      <div>
        <div class="recent-scores">
          <h3>Recent scores</h3>
          <button type="button" id="refresh-btn">Refresh</button>
        </div>
        <ul class="leader-board">
        </ul>
      </div>
      <div>
        <p>Play <a href="https://supermarioemulator.com/supermario.php" target="_blank">Super Mario</a> and add your score</p>
        <h3>Add your score</h3>
        <form action="#">
          <input type="text" placeholder="Your name" id="name"/><br>
          <input type="text" placeholder="Your score" id="score"/><br>
          <button type="submit" id="submit-btn">Submit</button>
        </form>
      </div>
    </div>
    <footer>created by <a href="https://github.com/ahmetbozaci">ahmetbozaci</a> - <a href="https://www.microverse.org/?grsf=04r25h">Microverse</a></footer>
    <script type='module' src="js/index.js"></script>
  </body>
</html>
